services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  core-api:
    build:
      context: ../..
      dockerfile: backend/core-api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}
    environment:
      PORT: 3300
      CHINA_LEADS_UI_ENTRY_URL: ${CHINA_LEADS_UI_ENTRY_URL}

  operation-api:
    build:
      context: ../..
      dockerfile: backend/plugins/operation_api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}

  sales-api:
    build:
      context: ../..
      dockerfile: backend/plugins/sales_api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}

  frontline-api:
    build:
      context: ../..
      dockerfile: backend/plugins/frontline_api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}

  china-leads-api:
    build:
      context: ../..
      dockerfile: backend/plugins/china_leads_api/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}

  gateway:
    build:
      context: ../..
      dockerfile: backend/gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - core-api
      - operation-api
      - sales-api
      - frontline-api
      - china-leads-api
      - redis
    env_file:
      - ${DEPLOY_ENV_FILE:-../../.env.production}
    environment:
      PORT: 4000

  core-ui:
    build:
      context: ../..
      dockerfile: frontend/core-ui/Dockerfile
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      NGINX_HOST: localhost
      NGINX_PORT: 80

  china-leads-ui:
    build:
      context: ../..
      dockerfile: frontend/plugins/china_leads_ui/Dockerfile
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      NGINX_HOST: localhost
      NGINX_PORT: 80

  public-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - gateway
      - core-ui
      - china-leads-ui
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo-data:
  redis-data:
